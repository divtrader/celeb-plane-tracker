<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>SKYCONTROL — Celebrity Airspace</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=6" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@joergdietrich/leaflet.terminator@1.1.0/L.Terminator.js"></script>
  <script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
</head>
<body>
  <!-- Full-canvas map -->
  <div id="map"></div>

  <!-- Top transmission ticker — auto-scroll recent activity feed -->
  <header id="transmission">
    <div id="transmission-frame">
      <div id="transmission-brand">
        <span class="callsign-dot"></span>
        <span class="callsign-label">SKYCONTROL</span>
        <span id="mission-time" class="callsign-time">00:00:00Z</span>
      </div>
      <div id="transmission-feed">
        <ol id="history-list" class="ticker-track">
          <li class="history-empty">// AWAITING TRANSMISSION</li>
        </ol>
      </div>
      <div id="transmission-status">
        <span id="status-dot" class="dot dot-idle"></span>
        <span id="status-text">STANDBY</span>
      </div>
    </div>
  </header>

  <!-- Compact ops console — bottom-left -->
  <aside id="hud">
    <div id="hud-corner-tl"></div><div id="hud-corner-tr"></div>
    <div id="hud-corner-bl"></div><div id="hud-corner-br"></div>
    <div class="hud-row">
      <span class="hud-label">TARGETS</span>
      <span class="hud-val"><span id="tracked-count">0</span></span>
    </div>
    <div class="hud-row hud-row-hot">
      <span class="hud-label">AIRBORNE</span>
      <span class="hud-val"><span id="airborne-count">0</span></span>
    </div>
    <div class="hud-row hud-row-soft">
      <span class="hud-label">SWEEP</span>
      <span id="last-update" class="hud-val mono-small">—</span>
    </div>
    <div id="poll-progress" class="hud-line"></div>
    <div id="poll-stats" class="hud-line"></div>
  </aside>

  <!-- Floating flight-strip cards on the right edge — currently airborne -->
  <section id="flight-strips" aria-label="Airborne flight strips"></section>

  <!-- Transient event card (top-center, slides in on alert) -->
  <div id="event-card" class="hidden">
    <div class="event-icon"></div>
    <div class="event-body">
      <div class="event-title"></div>
      <div class="event-action"></div>
      <div class="event-stats"></div>
    </div>
  </div>

  <!-- ISS mission card (floats bottom-right) -->
  <div id="iss-card" class="hidden">
    <div class="iss-icon">🛰️</div>
    <div class="iss-body">
      <div class="iss-title">International Space Station</div>
      <div class="iss-location"></div>
      <div class="iss-pass"></div>
    </div>
  </div>

  <!-- Legacy alert banner -->
  <div id="alert-banner" class="hidden"></div>

  <!-- Start button (gesture-unlock voice) -->
  <button id="start-btn">⏵ ENABLE VOICE</button>

  <!-- Roster modal — full-screen when opened via pull-tab -->
  <aside id="panel">
    <button id="panel-toggle" type="button" aria-label="Open tracked list">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 6 9 12 15 18"/>
      </svg>
    </button>
    <header id="panel-header">
      <h1>Tracked</h1>
      <span id="panel-count">0</span>
    </header>
    <ul id="celeb-list"></ul>
  </aside>

  <script type="module" src="src/app.js?v=3"></script>
</body>
</html>
