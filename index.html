<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Celeb Jet Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=4" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@joergdietrich/leaflet.terminator@1.1.0/L.Terminator.js"></script>
  <script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
</head>
<body>
  <div id="map"></div>

  <div id="hud">
    <div id="hud-corner-tl"></div><div id="hud-corner-tr"></div>
    <div id="hud-corner-bl"></div><div id="hud-corner-br"></div>
    <div id="hud-header">
      <span class="hud-label">SKYCONTROL</span>
      <span id="mission-time" class="hud-time">00:00:00Z</span>
    </div>
    <div id="status">
      <span id="status-dot" class="dot dot-idle"></span>
      <span id="status-text">Standby</span>
    </div>
    <div id="poll-progress"></div>
    <div id="poll-stats"></div>
    <div id="counts">
      <span class="hud-label-inline">Targets</span>
      <span id="tracked-count">0</span>
      <span class="hud-sep">/</span>
      <span id="airborne-count">0</span>
      <span class="hud-label-inline">airborne</span>
    </div>
    <div id="last-update">—</div>
  </div>

  <button id="start-btn">🔊 Enable voice alerts</button>

  <div id="alert-banner" class="hidden"></div>

  <div id="iss-card" class="hidden">
    <div class="iss-icon">🛰️</div>
    <div class="iss-body">
      <div class="iss-title">International Space Station</div>
      <div class="iss-location"></div>
      <div class="iss-pass"></div>
    </div>
  </div>

  <div id="event-card" class="hidden">
    <div class="event-icon"></div>
    <div class="event-body">
      <div class="event-title"></div>
      <div class="event-action"></div>
      <div class="event-stats"></div>
    </div>
  </div>

  <section id="history">
    <header id="history-header">Recent activity</header>
    <ol id="history-list">
      <li class="history-empty">Nothing yet — waiting for the first event.</li>
    </ol>
  </section>

  <aside id="panel">
    <button id="panel-toggle" type="button" aria-label="Hide tracked list">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="9 6 15 12 9 18"/>
      </svg>
    </button>
    <header id="panel-header">
      <h1>Tracked</h1>
      <span id="panel-count">0</span>
    </header>
    <ul id="celeb-list"></ul>
  </aside>

  <script type="module" src="src/app.js"></script>
</body>
</html>
